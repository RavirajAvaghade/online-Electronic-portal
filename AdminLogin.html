<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Luxury Admin Login</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    font-family:'Poppins',sans-serif;
}

/* LEFT SIDE IMAGE */
.left{
    width:50%;
    background:url("https://images.unsplash.com/photo-1492724441997-5dc865305da7?q=80&w=1920&auto=format&fit=crop")
    no-repeat center center/cover;
}

/* RIGHT SIDE LOGIN */
.right{
    width:50%;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    width:380px;
    padding:40px;
    background:#1a1a1a;
    border:2px solid gold;
    border-radius:15px;
    box-shadow:0 0 40px rgba(255,215,0,0.4);
    text-align:center;
    color:white;
}

.card h2{
    font-family:'Playfair Display',serif;
    font-size:32px;
    margin-bottom:25px;
    color:gold;
    letter-spacing:2px;
}

input{
    width:100%;
    padding:12px;
    margin:12px 0;
    border:none;
    border-radius:8px;
    outline:none;
    background:#2a2a2a;
    color:white;
    border:1px solid #444;
}

input:focus{
    border-color:gold;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:gold;
    color:black;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#ffd700;
    box-shadow:0 0 15px gold;
}

.footer{
    margin-top:20px;
    font-size:12px;
    color:#aaa;
}

</style>
</head>

<body>

<div class="left"></div>

<div class="right">

<div class="card">

<h2>ADMIN LOGIN</h2>

<form action="alog" method="post">
<input type="text" name="a_name" placeholder="Username" required>
<input type="password" name="a_pwd" placeholder="Password" required>
<button type="submit">Login</button>
</form>

<div class="footer">
Luxury Business Suite | Developed by Raviraj 👑
</div>

</div>

</div>

</body>
</html>
