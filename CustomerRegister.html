<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Customer Registration</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    background:url('https://images.unsplash.com/photo-1555529669-e69e7aa0ba9a') no-repeat center center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
}

.overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
}

.card{
    position:relative;
    width:420px;
    padding:35px;
    border-radius:20px;
    backdrop-filter: blur(18px);
    background: rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.3);
    box-shadow:0 25px 50px rgba(0,0,0,0.5);
    text-align:center;
    color:white;
    z-index:1;
    animation:fadeIn 0.8s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}

.card h2{
    margin-bottom:20px;
    font-weight:600;
}

input{
    width:100%;
    padding:10px 12px;
    margin:8px 0;
    border:none;
    border-radius:25px;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:25px;
    background: linear-gradient(45deg,#11998e,#38ef7d);
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

.login-link{
    margin-top:15px;
    display:block;
    color:white;
    text-decoration:none;
    font-size:14px;
}

.login-link:hover{
    text-decoration:underline;
}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="card">

<h2>📝 Customer Registration</h2>

<form action="new" method="post">

<input type="text" name="uname" placeholder="Username" required>

<input type="password" name="pword" placeholder="Password" required>

<input type="text" name="fname" placeholder="First Name" required>

<input type="text" name="lname" placeholder="Last Name" required>

<input type="text" name="ador" placeholder="Address" required>

<input type="email" name="mid" placeholder="Email ID" required>

<input type="text" name="phno" placeholder="Mobile Number" required>

<button type="submit">Register</button>

</form>

<a href="CustomerLogin.jsp" class="login-link">
Already have an account? Login
</a>

</div>

</body>
</html>
