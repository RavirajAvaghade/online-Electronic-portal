<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Online Electronic Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:'Poppins',sans-serif;
    background:#0f2027;
}

/* Animated Background */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:
    linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.75)),
    url("https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=2400&auto=format&fit=crop")
    no-repeat center center/cover;
    animation:zoom 25s infinite alternate ease-in-out;
    z-index:-2;
}

@keyframes zoom{
    from{transform:scale(1);}
    to{transform:scale(1.08);}
}

/* Floating glow particles */
body::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background-image: radial-gradient(#00ffff 1px, transparent 1px);
    background-size:80px 80px;
    opacity:0.05;
    animation:move 40s linear infinite;
    z-index:-1;
}

@keyframes move{
    from{background-position:0 0;}
    to{background-position:2000px 2000px;}
}

/* Container */
.container{
    width:520px;
    padding:60px;
    text-align:center;
    background:rgba(0,0,0,0.65);
    border-radius:25px;
    backdrop-filter:blur(15px);
    box-shadow:0 0 60px rgba(0,255,255,0.3);
    color:white;
    animation:fadeIn 1.2s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(40px);}
    to{opacity:1; transform:translateY(0);}
}

.container h1{
    font-family:'Orbitron',sans-serif;
    font-size:28px;
    margin-bottom:40px;
    letter-spacing:2px;
    text-shadow:0 0 15px cyan;
}

/* Buttons */
.container a{
    display:block;
    text-decoration:none;
    padding:15px;
    margin:20px 0;
    border-radius:40px;
    font-weight:600;
    letter-spacing:1px;
    transition:0.4s;
}

.admin{
    background:linear-gradient(45deg,#00f5ff,#00c3ff);
    color:black;
}

.customer{
    background:linear-gradient(45deg,#38ef7d,#11998e);
    color:black;
}

.container a:hover{
    transform:scale(1.05);
    box-shadow:0 0 25px rgba(0,255,255,0.6);
}

/* Footer */
.footer{
    margin-top:30px;
    font-size:13px;
    color:#ccc;
}

</style>
</head>

<body>

<script>
window.onload = function() {
    if(window.location.href.includes("msg=logout")){
        alert("You Logout Successfully");
    }
};
</script>

<div class="container">

<h1>⚡ ONLINE ELECTRONIC PORTAL ⚡</h1>

<a href="AdminLogin.html" class="admin">🔐 Admin Login</a>
<a href="CustomerLogin.html" class="customer">🛒 Customer Login</a>

<div class="footer">
© 2026 Online Electronic Portal | Developed by Raviraj 🚀
</div>

</div>

</body>
</html>
